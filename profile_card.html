<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
        }

        body {
            background-color:white;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px;
        }

        /* External Component Border Outer Box */
        .outer-canvas {
            border: 2px solid #000000;
            width: 380px;
            min-height: 500px;
            background:linear-gradient( red,grey );
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            border-radius: 25%;
        }

        /* Section Heading */
        .page-header {
            font-size: 24px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Profile Details Wrapper */
        .profile-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 223px;
        }

        /* Circular Avatar Frame */
        .avatar-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid #000000;
            overflow: hidden;
            margin-bottom: 50px;
            display: flex ;
            justify-content: center;
            align-items: center;
            background-color: #e0e0e0;
        }

        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit:cover;
        }

        /* Text Styles */
        .profile-name {
            font-size: 18px;
            color:black;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .profile-role {
            font-size: 18px;
            color: #000000;
            margin-bottom: 25px;
            font-weight: 500;
        }

       

        
    </style>
</head>
<body>

    
    <div class="outer-canvas">
        <h1 class="page-header">Profile Info</h1>
        
        <div class="profile-content">
            
            <div class="avatar-frame">
                
                <img src="dwayne-johnson-eyebrow-raise-meme-10.webp" alt="AKC was here">
            </div>
            
            
            <div class="profile-name">Arnav Vyavahare</div>
            <div class="profile-role">NEWBIE</div>
            
            
            <button class="btn-follow">Follow for more </button><br>
            <button class="btn-follow">why u are here just to suffer</button>
        </div>
    </div>

</body>
</html>
